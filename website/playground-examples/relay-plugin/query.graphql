# Fetch a team, then page through its roster.
query TeamRoster {
  team(id: "1") {
    id
    name
    city
    players(first: 2) {
      edges {
        cursor
        node {
          id
          name
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

# Refetch any object by its global id via the node field.
query Refetch {
  node(id: "VGVhbTox") {
    id
    ... on Team {
      name
    }
  }
}
